name: lms-platform

services:
  - name: web
    source_dir: /
    github:
      repo: YOUR_GITHUB_USERNAME/lms-platform
      branch: main
      deploy_on_push: true
    run_command: >
      daphne -b 0.0.0.0 -p $PORT config.asgi:application
    build_command: >
      pip install -r requirements/production.txt &&
      python manage.py migrate &&
      python manage.py collectstatic --noinput
    environment_slug: python
    instance_count: 1
    instance_size_slug: basic-xs
    envs:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        type: SECRET
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "${APP_DOMAIN}"
    http_port: 8080
    health_check:
      http_path: /health/
      initial_delay_seconds: 20
      period_seconds: 30

  - name: celery-worker
    source_dir: /
    github:
      repo: YOUR_GITHUB_USERNAME/lms-platform
      branch: main
    run_command: >
      celery -A config worker -l info -Q default,notifications,github,payments -c 2
    environment_slug: python
    instance_count: 1
    instance_size_slug: basic-xs
    envs:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        type: SECRET

  - name: celery-beat
    source_dir: /
    github:
      repo: YOUR_GITHUB_USERNAME/lms-platform
      branch: main
    run_command: >
      celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment_slug: python
    instance_count: 1
    instance_size_slug: basic-xs
    envs:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        type: SECRET

databases:
  - name: lms-db
    engine: PG
    version: "15"
    size: db-s-1vcpu-1gb
    num_nodes: 1

