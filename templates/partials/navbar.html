{# ── Topbar ── #}
<header class="flex h-16 shrink-0 items-center justify-between border-b border-slate-200/60 bg-white/80 backdrop-blur-md px-4 lg:px-6">
    {# Left: Hamburger + Breadcrumb area #}
    <div class="flex items-center gap-3">
        <button @click="mobileSidebar = true"
                class="rounded-lg p-2 text-slate-400 transition hover:bg-slate-100 hover:text-slate-600 lg:hidden">
            <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/></svg>
        </button>
        <div class="relative hidden sm:block">
            <svg class="pointer-events-none absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/></svg>
            <input type="text" placeholder="Axtar..."
                   class="h-9 w-56 rounded-xl border-0 bg-slate-100 pl-9 pr-3 text-sm text-slate-700 placeholder-slate-400 outline-none ring-1 ring-slate-200/60 transition focus:bg-white focus:ring-2 focus:ring-primary-300">
        </div>
    </div>

    {# Right: Actions #}
    <div class="flex items-center gap-1.5">
        <a href="{% url 'users:profile' %}"
           class="rounded-xl p-2 text-slate-400 transition hover:bg-slate-100 hover:text-slate-600">
            <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        </a>

        <a href="{% url 'notifications:list' %}"
           class="relative rounded-xl p-2 text-slate-400 transition hover:bg-slate-100 hover:text-slate-600">
            <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0"/></svg>
            <span id="notification-badge"
                  class="absolute right-1.5 top-1.5 hidden h-2 w-2 rounded-full bg-red-500 ring-2 ring-white"></span>
        </a>

        <div class="mx-1.5 h-6 w-px bg-slate-200/60"></div>

        {# User dropdown #}
        <div x-data="{ open: false }" class="relative">
            <button @click="open = !open" @click.outside="open = false"
                    class="flex items-center gap-2.5 rounded-xl px-2 py-1.5 transition hover:bg-slate-100">
                {% if request.user.avatar %}
                    <img src="{{ request.user.avatar.url }}" class="h-8 w-8 rounded-full object-cover ring-2 ring-slate-200/60" alt="">
                {% else %}
                    <div class="flex h-8 w-8 items-center justify-center rounded-full text-xs font-bold text-white ring-2 ring-primary-200/40"
                         style="background:linear-gradient(135deg,#6366f1,#4f46e5)">
                        {{ request.user.first_name|first|upper }}
                    </div>
                {% endif %}
                <div class="hidden text-left sm:block">
                    <p class="text-[13px] font-semibold leading-tight text-slate-700">{{ request.user.get_full_name }}</p>
                    <p class="text-[11px] leading-tight text-slate-400">{% if request.user.is_teacher %}Müəllim{% else %}Tələbə{% endif %}</p>
                </div>
                <svg class="h-4 w-4 text-slate-400 transition" :class="open && 'rotate-180'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>
            </button>

            <div x-show="open"
                 x-transition:enter="transition ease-out duration-100"
                 x-transition:enter-start="opacity-0 scale-95 -translate-y-1"
                 x-transition:enter-end="opacity-100 scale-100 translate-y-0"
                 x-transition:leave="transition ease-in duration-75"
                 x-transition:leave-start="opacity-100 scale-100"
                 x-transition:leave-end="opacity-0 scale-95"
                 class="absolute right-0 z-20 mt-2.5 w-56 overflow-hidden rounded-2xl border border-slate-200/60 bg-white shadow-xl shadow-slate-200/40">
                <div class="border-b border-slate-100 px-4 py-3">
                    <p class="text-sm font-semibold text-slate-800">{{ request.user.get_full_name }}</p>
                    <p class="mt-0.5 text-xs text-slate-400">{{ request.user.email }}</p>
                </div>
                <div class="py-1.5">
                    <a href="{% url 'users:profile' %}"
                       class="flex items-center gap-2.5 px-4 py-2 text-sm text-slate-600 transition hover:bg-slate-50 hover:text-slate-800">
                        <svg class="h-4 w-4 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"/></svg>
                        Profil
                    </a>
                    <a href="{% url 'support:list' %}"
                       class="flex items-center gap-2.5 px-4 py-2 text-sm text-slate-600 transition hover:bg-slate-50 hover:text-slate-800">
                        <svg class="h-4 w-4 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827v.75M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9 5.25h.008v.008H12v-.008z"/></svg>
                        Dəstək
                    </a>
                </div>
                <div class="border-t border-slate-100">
                    <form method="post" action="{% url 'account_logout' %}">
                        {% csrf_token %}
                        <button type="submit"
                                class="flex w-full items-center gap-2.5 px-4 py-2.5 text-sm text-red-500 transition hover:bg-red-50/80">
                            <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75"/></svg>
                            Çıxış
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</header>
