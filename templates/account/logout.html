{% extends 'account/base.html' %}

{% block title %}Çıxış — LMS Platform{% endblock %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center">
    <div class="card shadow-sm border-0" style="width:440px">
        <div class="card-body p-5 text-center">
            <i class="bi bi-box-arrow-right text-warning" style="font-size:3rem"></i>
            <h3 class="fw-bold mt-3">Çıxış etmək istəyirsiniz?</h3>
            <p class="text-muted">Hesabınızdan çıxmaq üçün təsdiq edin.</p>
            <form method="post" action="{% url 'account_logout' %}">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger btn-lg px-5">
                    <i class="bi bi-box-arrow-right me-2"></i>Çıxış et
                </button>
                <a href="{% url 'analytics:dashboard' %}" class="btn btn-outline-secondary btn-lg px-5 ms-2">
                    Geri dön
                </a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
