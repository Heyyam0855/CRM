{% extends 'account/base.html' %}

{% block title %}Çıxış — LMS Platform{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
    <div class="bg-white/95 backdrop-blur-xl rounded-lg shadow-2xl shadow-slate-900/[.08] w-full max-w-md p-8 text-center ring-1 ring-white/20">
        <div class="kpi-icon bg-gradient-to-br from-amber-500 to-amber-600 shadow-lg shadow-amber-500/25 mx-auto mb-5">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9"/></svg>
        </div>
        <h1 class="text-2xl font-bold text-slate-900 mb-2">Çıxış etmək istəyirsiniz?</h1>
        <p class="text-slate-400 mb-8">Hesabınızdan çıxmaq üçün təsdiq edin.</p>
        <form method="post" action="{% url 'account_logout' %}" class="flex items-center justify-center gap-3">
            {% csrf_token %}
            <button type="submit" class="btn btn-primary !bg-gradient-to-r !from-red-500 !to-red-600 hover:!from-red-600 hover:!to-red-700 !shadow-red-500/25">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9"/></svg>
                Çıxış et
            </button>
            <a href="{% url 'analytics:dashboard' %}" class="btn btn-secondary">
                Geri dön
            </a>
        </form>
    </div>
</div>
{% endblock %}
