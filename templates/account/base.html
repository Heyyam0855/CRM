{% load static %}
<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LMS Platform{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-gradient-to-br from-primary-600 to-primary-900 min-h-screen" x-data x-cloak>
<main>
    {% if messages %}
    <div class="fixed top-4 right-4 z-50 space-y-2">
        {% for message in messages %}
        <div x-data="{ show: true }" x-show="show" x-init="setTimeout(() => show = false, 5000)"
             x-transition:leave="transition ease-in duration-200"
             x-transition:leave-start="opacity-100 translate-y-0"
             x-transition:leave-end="opacity-0 -translate-y-2"
             class="px-4 py-3 rounded-lg shadow-lg text-sm font-medium
                {% if message.tags == 'success' %}bg-emerald-500 text-white
                {% elif message.tags == 'error' %}bg-red-500 text-white
                {% elif message.tags == 'warning' %}bg-amber-500 text-white
                {% else %}bg-primary-500 text-white{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}
    {% block content %}{% endblock %}
</main>
<script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
{% block extra_js %}{% endblock %}
</body>
</html>
