{% load static %}
<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LMS Platform{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body class="min-h-screen relative overflow-hidden" x-data x-cloak>
<div class="absolute inset-0 bg-gradient-to-br from-slate-900 via-primary-900 to-slate-900"></div>
<div class="absolute top-[-20%] left-[-10%] w-[500px] h-[500px] rounded-full bg-primary-500/10 blur-3xl"></div>
<div class="absolute bottom-[-20%] right-[-10%] w-[500px] h-[500px] rounded-full bg-primary-400/10 blur-3xl"></div>
<main class="relative z-10">
    {% if messages %}
    <div class="fixed top-4 right-4 z-50 space-y-2">
        {% for message in messages %}
        <div x-data="{ show: true }" x-show="show" x-init="setTimeout(() => show = false, 5000)"
             x-transition:leave="transition ease-in duration-200"
             x-transition:leave-start="opacity-100 translate-y-0"
             x-transition:leave-end="opacity-0 -translate-y-2"
             class="flex items-center gap-2 px-4 py-3 rounded-md shadow-2xl text-sm font-medium backdrop-blur-xl
                {% if message.tags == 'success' %}bg-emerald-500/90 text-white ring-1 ring-emerald-400/30
                {% elif message.tags == 'error' %}bg-red-500/90 text-white ring-1 ring-red-400/30
                {% elif message.tags == 'warning' %}bg-amber-500/90 text-white ring-1 ring-amber-400/30
                {% else %}bg-primary-500/90 text-white ring-1 ring-primary-400/30{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}
    {% block content %}{% endblock %}
</main>
<script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
{% block extra_js %}{% endblock %}
</body>
</html>
