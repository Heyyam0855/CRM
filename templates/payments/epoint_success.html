{% extends 'base.html' %}

{% block title %}Ödəniş uğurlu — LMS{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-12">
    <div class="card p-10 text-center">
        <div class="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-5">
            <svg class="w-8 h-8 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/></svg>
        </div>
        <h1 class="text-xl font-bold text-slate-900 mb-2">Ödəniş uğurla tamamlandı!</h1>
        <p class="text-sm text-slate-500 mb-6">Ödənişiniz qəbul edildi. Təşəkkür edirik.</p>
        <a href="{% url 'payments:list' %}"
           class="inline-flex items-center gap-2 px-5 py-2.5 rounded-xl bg-primary-600 text-white text-sm font-semibold hover:bg-primary-700 transition">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18"/></svg>
            Ödənişlərə qayıt
        </a>
    </div>
</div>
{% endblock %}
